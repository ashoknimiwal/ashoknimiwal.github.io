<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashok Kumar</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="images/icons/icon-6.png" type="image/x-icon">
    <link rel="shortcut icon" href="images/icons/icon-6.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="font.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Header and Navigation -->
    <header>
        <h2><a href="#" id="home-link">Ashok Kumar</a></h2>
        <nav>
            <ul>
                <li><a href="#news">News</a></li>
                <li><a href="#publications">Publications</a></li>
                <li><a href="#talks">Talks</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#blog">Blog</a></li>
            </ul>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
        </nav>
    </header>

    <main>
        <!-- About Me Section — populated from api/about.json -->
        <section id="about">
            <div class="profile-container" id="about-profile">
                <!-- Profile pic populated dynamically -->
            </div>
            <div class="about-content" id="about-content">
                <!-- Content populated dynamically -->
            </div>
        </section>

        <!-- News Section -->
        <section id="news">
            <h2>News</h2>
            <div id="news-container">
                <!-- News items will be dynamically added here -->
            </div>
        </section>

        <!-- Publications Section -->
        <section id="publications">
            <h2>Publications</h2>
            <div id="publications-container">
                <!-- Publications will be dynamically added here -->
            </div>
        </section>

        <!-- Talks Section -->
        <section id="talks">
            <h2>Talks/Workshops</h2>
            <div id="talks-container">
                <!-- Talks will be dynamically added here -->
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects">
            <h2>Pet projects</h2>
            <div id="projects-container" class="project-grid">
                <!-- Projects will be dynamically added here -->
            </div>
        </section>

        <!-- Blog Section -->
        <section id="blog">
            <h2>Blog</h2>
            <div id="blogPosts-container" class="blog-grid">
                <!-- Blog posts will be dynamically added here -->
            </div>
        </section>

        <!-- Miscellaneous Section -->
        <section id="miscellaneous">
            <h2>Misc unsorted</h2>
            <ul id="miscellaneous-container">
                <!-- Miscellaneous items will be dynamically added here -->
            </ul>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-signature">
                <p>
                    <span class="code-tag">&lt;/&gt;</span>
                    <span class="normal">with</span>
                    <span class="heart">&#10084;&#65039;</span>
                    <span class="normal">by</span>
                    <span class="bold">Ashok</span>
                </p>
                <div class="social-icons">
                    <a id="email-button" href="#" aria-label="Email"><i class="fas fa-envelope"></i></a>
                    <a href="https://github.com/ashoknimiwal" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
                    <a href="https://in.linkedin.com/in/ashok-kumar-81b450197" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                    <a href="https://x.com/nimiwal_ashok" target="_blank" aria-label="X"><i class="fab fa-x-twitter"></i></a>
                    <a href="https://scholar.google.ca/citations?hl=en&authuser=1&user=gGUCRcUAAAAJ" target="_blank" aria-label="Google Scholar"><i class="fab fa-google-scholar"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
